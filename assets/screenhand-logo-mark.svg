<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">ScreenHand logo mark</title>
  <desc id="desc">A developer-friendly ScreenHand logo combining a terminal prompt, screen frame, and action cursor.</desc>
  <defs>
    <linearGradient id="tile" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111f"/>
      <stop offset=".56" stop-color="#10254d"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="frame" x1="61" y1="58" x2="194" y2="177" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="prompt" x1="83" y1="110" x2="157" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d8fbff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="cursor" x1="154" y1="132" x2="216" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <radialGradient id="clickGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(194 102) rotate(90) scale(20)">
      <stop stop-color="#f472b6"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#tile)"/>
  <rect x="16.75" y="16.75" width="222.5" height="222.5" rx="55.25" stroke="#93c5fd" stroke-opacity=".16" stroke-width="1.5"/>

  <path d="M64 74c0-10.493 8.507-19 19-19h90c10.493 0 19 8.507 19 19v80c0 10.493-8.507 19-19 19h-31" stroke="url(#frame)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M64 85h128" stroke="#93c5fd" stroke-opacity=".42" stroke-width="8" stroke-linecap="round"/>
  <circle cx="82" cy="70" r="4.5" fill="#38bdf8"/>
  <circle cx="97" cy="70" r="4.5" fill="#a78bfa"/>
  <circle cx="112" cy="70" r="4.5" fill="#f472b6"/>

  <path d="M87 110l27 18-27 18" stroke="url(#prompt)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M130 146h24" stroke="url(#prompt)" stroke-width="13" stroke-linecap="round"/>

  <circle cx="194" cy="102" r="20" fill="url(#clickGlow)"/>
  <circle cx="194" cy="102" r="10" stroke="#f9a8d4" stroke-width="4" stroke-opacity=".7"/>
  <circle cx="194" cy="102" r="3.5" fill="#f9a8d4"/>

  <path d="M154 131l20 67 14-20 24 13 7-12-24-13 18-17-59-18Z" fill="url(#cursor)" stroke="#93c5fd" stroke-width="7" stroke-linejoin="round"/>
</svg>
